<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claw Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ── Viewport & World ─────────────────────────────────────────────── */
    #viewport {
      position: fixed;
      inset: 0;
      overflow: auto;
      cursor: grab;
    }
    #viewport.dragging { cursor: grabbing; }
    /* hide scrollbars visually but keep scrollable */
    #viewport::-webkit-scrollbar { display: none; }

    #world {
      position: relative;
      width: 4000px;
      height: 3000px;
      background-color: #0c0f0c;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 64px 64px;
    }

    /* Soft glow around town center */
    #world::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 1000px 700px at 2000px 1500px,
        rgba(30,50,20,0.55) 0%,
        rgba(10,20,8,0.2) 50%,
        transparent 75%);
      pointer-events: none;
    }

    /* ── Buildings ────────────────────────────────────────────────────── */
    .building {
      position: absolute;
      transform: translate(-50%, -50%);
      /* needed for mail badge positioning */
      text-align: center;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
      user-select: none;
      -webkit-user-select: none;
    }
    .building:hover {
      transform: translate(-50%, -50%) scale(1.1);
      filter: brightness(1.2);
      z-index: 10;
    }

    .b-icon {
      font-size: 2.4rem;
      line-height: 1;
      display: block;
    }
    .b-base {
      height: 8px;
      width: 50px;
      margin: 3px auto 0;
      border-radius: 3px;
      opacity: 0.5;
    }
    .b-label {
      font-size: 0.6rem;
      color: #777;
      margin-top: 5px;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* Town Hall — bigger and brighter */
    .building.town-hall .b-icon { font-size: 3.8rem; }
    .building.town-hall .b-base { width: 70px; height: 12px; opacity: 0.7; }
    .building.town-hall .b-label {
      font-size: 0.72rem;
      color: #ccc;
      letter-spacing: 0.12em;
      font-weight: bold;
    }

    /* ── Fixed UI bar ─────────────────────────────────────────────────── */
    #ui-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1.2rem;
      background: linear-gradient(180deg, rgba(10,10,10,0.92) 0%, transparent 100%);
      pointer-events: none;
    }
    .ui-logo {
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #ui-right {
      pointer-events: all;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    #username-tag {
      font-size: 0.75rem;
      color: #666;
      padding: 0.25rem 0.65rem;
      border: 1px solid #1f1f1f;
      border-radius: 999px;
      background: rgba(10,10,10,0.85);
    }
    #logout-btn {
      font-family: inherit;
      font-size: 0.7rem;
      color: #444;
      background: none;
      border: 1px solid #1a1a1a;
      border-radius: 4px;
      padding: 0.22rem 0.55rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #logout-btn:hover { color: #999; border-color: #333; }

    /* ── Tooltip ──────────────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      z-index: 300;
      background: rgba(8,8,8,0.96);
      border: 1px solid #222;
      border-radius: 6px;
      padding: 0.45rem 0.7rem;
      font-size: 0.72rem;
      color: #bbb;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      max-width: 220px;
      line-height: 1.4;
    }
    #tooltip.show { opacity: 1; }

    /* ── Onboarding modal ─────────────────────────────────────────────── */
    #onboard-overlay {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    #onboard-overlay.show { opacity: 1; pointer-events: all; }
    #onboard-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2rem;
      max-width: 420px;
      width: 90%;
    }
    #onboard-box h2 { font-size: 1.1rem; margin-bottom: 0.5rem; color: #e0e0e0; }
    #onboard-box p { font-size: 0.8rem; color: #666; margin-bottom: 1.25rem; line-height: 1.5; }
    #onboard-building-preview {
      text-align: center;
      margin-bottom: 1.25rem;
    }
    #onboard-building-preview .b-icon { font-size: 3rem; }
    #onboard-building-preview .b-desc {
      font-size: 0.72rem;
      color: #555;
      margin-top: 0.5rem;
      line-height: 1.5;
    }
    #onboard-name-input {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 0.55rem 0.75rem;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      margin-bottom: 1rem;
    }
    #onboard-name-input:focus { border-color: #3b2f6e; }
    #onboard-submit {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.6rem;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #onboard-submit:hover { opacity: 0.88; }
    #onboard-skip {
      display: block;
      text-align: center;
      margin-top: 0.75rem;
      font-size: 0.7rem;
      color: #444;
      cursor: pointer;
      transition: color 0.15s;
    }
    #onboard-skip:hover { color: #777; }

    /* ── Chat button & panel ──────────────────────────────────────────── */
    #chat-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 200;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(124,58,237,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #chat-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 28px rgba(124,58,237,0.65);
    }

    #chat-panel {
      position: fixed;
      bottom: 5.2rem;
      right: 1.5rem;
      width: 360px;
      max-height: 62vh;
      z-index: 200;
      background: #0f0f0f;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
      transform: scale(0.95) translateY(8px);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    #chat-panel.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .chat-header {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid #181818;
      font-size: 0.75rem;
      color: #555;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .chat-header .pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    #chat-msgs {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      min-height: 180px;
    }
    #chat-msgs::-webkit-scrollbar { width: 3px; }
    #chat-msgs::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    .msg {
      max-width: 88%;
      padding: 0.45rem 0.7rem;
      border-radius: 8px;
      font-size: 0.78rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #1a1730;
      border: 1px solid #2d2460;
      color: #c4b5fd;
    }
    .msg.claw {
      align-self: flex-start;
      background: #101a10;
      border: 1px solid #1a3020;
      color: #86efac;
    }
    .msg.system {
      align-self: center;
      background: none;
      border: none;
      color: #333;
      font-size: 0.68rem;
      padding: 0.2rem 0;
    }

    #chat-queue {
      padding: 0.25rem 1rem;
      font-size: 0.68rem;
      color: #444;
      border-top: 1px solid #151515;
      min-height: 1.4rem;
    }

    .chat-input-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.65rem;
      border-top: 1px solid #151515;
    }
    #chat-input {
      flex: 1;
      background: #0a0a0a;
      border: 1px solid #1e1e1e;
      border-radius: 6px;
      padding: 0.45rem 0.65rem;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.78rem;
      outline: none;
      resize: none;
      line-height: 1.4;
    }
    #chat-input:focus { border-color: #2d2460; }
    #chat-send {
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0 0.7rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.78rem;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #chat-send:hover { background: #6d28d9; }
    #chat-send:disabled { background: #1a1a1a; color: #444; cursor: default; }

    /* ── Mail badge on buildings ─────────────────────────────────────── */
    .b-mail-badge {
      position: absolute;
      top: -4px;
      right: -8px;
      background: #7c3aed;
      color: white;
      font-size: 0.55rem;
      border-radius: 999px;
      padding: 0.1rem 0.35rem;
      min-width: 1.1rem;
      text-align: center;
      z-index: 5;
      pointer-events: none;
    }

    /* ── Coords ───────────────────────────────────────────────────────── */
    #coords {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      z-index: 50;
      font-size: 0.62rem;
      color: #2a2a2a;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- UI bar -->
  <div id="ui-bar">
    <span class="ui-logo">✦ CLAW HUB</span>
    <div id="ui-right">
      <span id="username-tag">...</span>
      <button id="logout-btn" onclick="logout()">logout</button>
    </div>
  </div>

  <!-- World -->
  <div id="viewport">
    <div id="world">
      <!-- Town Hall -->
      <div class="building town-hall"
           style="left:2000px; top:1500px;"
           onclick="window.location.href='/town'"
           data-tip="The heart of the town. Click to see what's happening.">
        <span class="b-icon">🏛️</span>
        <div class="b-base" style="background:#f59e0b;"></div>
        <div class="b-label">TOWN HALL</div>
      </div>
    </div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip"></div>

  <!-- Onboarding modal -->
  <div id="onboard-overlay">
    <div id="onboard-box">
      <h2>welcome to claw hub ✦</h2>
      <p>Claw has built you a place in town. What do you want it to become?</p>
      <div id="onboard-building-preview">
        <span class="b-icon" id="ob-icon">🏡</span>
        <div class="b-desc" id="ob-desc">your building is waiting...</div>
      </div>
      <input id="onboard-name-input" type="text" placeholder="name your building..." maxlength="40" />
      <button id="onboard-submit" onclick="submitOnboard()">claim it</button>
      <span id="onboard-skip" onclick="skipOnboard()">skip for now</span>
    </div>
  </div>

  <!-- Chat button -->
  <button id="chat-btn" onclick="toggleChat()">✦</button>

  <!-- Chat panel -->
  <div id="chat-panel">
    <div class="chat-header">
      <span class="pulse"></span>
      <span>Claw</span>
    </div>
    <div id="chat-msgs">
      <div class="msg system">your conversation with claw</div>
    </div>
    <div id="chat-queue"></div>
    <div class="chat-input-row">
      <textarea id="chat-input" rows="1" placeholder="say something..."
                oninput="autoResize(this)" onkeydown="chatKey(event)"></textarea>
      <button id="chat-send" onclick="sendMsg()">send</button>
    </div>
  </div>

  <!-- Coords -->
  <div id="coords"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ── State ───────────────────────────────────────────────────────────────
    let me = null;
    let chatOpen = false;
    const viewport = document.getElementById('viewport');
    const world    = document.getElementById('world');
    const tooltip  = document.getElementById('tooltip');

    // ── Init ────────────────────────────────────────────────────────────────
    async function init() {
      const [meData, townData] = await Promise.all([
        fetch('/api/me').then(r => r.json()),
        fetch('/api/town').then(r => r.json()),
      ]);

      me = meData;
      document.getElementById('username-tag').textContent = '✦ ' + me.username;

      (townData.buildings || []).forEach(addBuilding);

      centerViewport();

      if (!me.onboarded) {
        setTimeout(() => showOnboarding(townData.buildings), 600);
      }

      // Check own unread mail count
      checkUnread();
    }

    async function checkUnread() {
      const data = await fetch('/api/mail/unread').then(r => r.json()).catch(() => ({ count: 0 }));
      if (data.count > 0) {
        // Show badge on own building
        const myBld = document.getElementById(`bld-${me.username}`);
        if (myBld) {
          const badge = myBld.querySelector('.b-mail-badge');
          if (badge) { badge.textContent = data.count; badge.style.display = ''; }
        }
      }
    }

    function centerViewport() {
      viewport.scrollLeft = 2000 - window.innerWidth  / 2;
      viewport.scrollTop  = 1500 - window.innerHeight / 2;
    }

    // ── Buildings ───────────────────────────────────────────────────────────
    function addBuilding(b, unread = 0) {
      const div = document.createElement('div');
      div.className = 'building';
      div.id = `bld-${b.username}`;
      div.dataset.tip = b.description || `${b.username}'s building`;
      div.style.cssText = `left:${b.x}px; top:${b.y}px;`;
      div.innerHTML = `
        <span class="b-icon">${b.emoji || '🏠'}</span>
        ${unread > 0 ? `<div class="b-mail-badge">${unread}</div>` : '<div class="b-mail-badge" style="display:none"></div>'}
        <div class="b-base" style="background:${b.color || '#555'};"></div>
        <div class="b-label">${b.username}</div>
      `;
      div.addEventListener('click', () => location.href = `/building/${b.username}`);
      world.appendChild(div);
    }

    // ── Onboarding ──────────────────────────────────────────────────────────
    function showOnboarding(buildings) {
      const myBld = buildings?.find(b => b.username === me.username);
      if (myBld) {
        document.getElementById('ob-icon').textContent = myBld.emoji || '🏠';
        document.getElementById('ob-desc').textContent = myBld.description || '';
        document.getElementById('onboard-name-input').placeholder =
          `name your ${myBld.label?.toLowerCase() || 'building'}...`;
      }
      document.getElementById('onboard-overlay').classList.add('show');
      document.getElementById('onboard-name-input').focus();
    }

    async function submitOnboard() {
      const name = document.getElementById('onboard-name-input').value.trim();
      if (!name) return;
      await fetch('/api/onboard', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ buildingName: name }),
      });
      document.getElementById('onboard-overlay').classList.remove('show');
      if (me) me.onboarded = 1;
    }

    function skipOnboard() {
      document.getElementById('onboard-overlay').classList.remove('show');
    }

    // ── Tooltip ─────────────────────────────────────────────────────────────
    world.addEventListener('mouseover', e => {
      const bld = e.target.closest('[data-tip]');
      if (bld) {
        tooltip.textContent = bld.dataset.tip;
        tooltip.classList.add('show');
      }
    });
    world.addEventListener('mouseout', e => {
      if (!e.target.closest('[data-tip]')) return;
      tooltip.classList.remove('show');
    });
    document.addEventListener('mousemove', e => {
      if (!tooltip.classList.contains('show')) return;
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top  = (e.clientY - 6)  + 'px';
    });

    // ── Drag-to-scroll ──────────────────────────────────────────────────────
    let drag = false, dx, dy, sl, st;
    viewport.addEventListener('mousedown', e => {
      if (e.target.closest('.building')) return;
      drag = true;
      dx = e.pageX; dy = e.pageY;
      sl = viewport.scrollLeft; st = viewport.scrollTop;
      viewport.classList.add('dragging');
    });
    document.addEventListener('mousemove', e => {
      if (!drag) return;
      viewport.scrollLeft = sl - (e.pageX - dx);
      viewport.scrollTop  = st - (e.pageY - dy);
    });
    document.addEventListener('mouseup', () => {
      drag = false;
      viewport.classList.remove('dragging');
    });

    // ── Coords ──────────────────────────────────────────────────────────────
    viewport.addEventListener('scroll', () => {
      const cx = Math.round(viewport.scrollLeft + window.innerWidth  / 2);
      const cy = Math.round(viewport.scrollTop  + window.innerHeight / 2);
      document.getElementById('coords').textContent = `${cx}, ${cy}`;
    });

    // ── Chat ────────────────────────────────────────────────────────────────
    function toggleChat() {
      chatOpen = !chatOpen;
      document.getElementById('chat-panel').classList.toggle('open', chatOpen);
      if (chatOpen) {
        loadHistory();
        document.getElementById('chat-input').focus();
      }
    }

    async function loadHistory() {
      const data = await fetch('/api/messages').then(r => r.json()).catch(() => []);
      const msgs = Array.isArray(data) ? data : [];
      const box  = document.getElementById('chat-msgs');
      box.querySelectorAll('.msg:not(.system)').forEach(m => m.remove());
      msgs.forEach(m => appendMsg(m.role === 'user' ? 'user' : 'claw', m.content, false));
      box.scrollTop = box.scrollHeight;
    }

    function appendMsg(role, content, scroll = true) {
      const box = document.getElementById('chat-msgs');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = content;
      box.appendChild(div);
      if (scroll) box.scrollTop = box.scrollHeight;
    }

    function chatKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    }

    async function sendMsg() {
      const input = document.getElementById('chat-input');
      const text  = input.value.trim();
      if (!text) return;
      input.value = '';
      input.style.height = 'auto';

      appendMsg('user', text);
      document.getElementById('chat-send').disabled = true;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        }).then(r => r.json());

        const q = document.getElementById('chat-queue');
        if (res.queuePosition !== undefined) {
          q.textContent = res.queuePosition === 0
            ? 'processing...'
            : `position ${res.queuePosition + 1} in queue`;
        }
      } catch {
        appendMsg('system', 'failed to send');
      }

      document.getElementById('chat-send').disabled = false;
      document.getElementById('chat-input').focus();
    }

    // ── Auth ────────────────────────────────────────────────────────────────
    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      location.href = '/login';
    }

    // ── Socket.io ───────────────────────────────────────────────────────────
    const socket = io();

    socket.on('chat_response', data => {
      appendMsg('claw', data.content);
      document.getElementById('chat-queue').textContent = '';
    });

    socket.on('queue_update', data => {
      const q = document.getElementById('chat-queue');
      if (data.position !== undefined) {
        q.textContent = data.position === 0
          ? 'processing...'
          : `position ${data.position + 1} in queue`;
      }
    });

    socket.on('town_update', data => {
      if (data.type === 'new_building' && data.building) {
        addBuilding(data.building);
      }
    });

    socket.on('new_mail', () => {
      if (me) checkUnread();
    });

    // ── Start ───────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
