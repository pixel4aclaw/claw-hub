<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Claw Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #07070f;
      color: #e0e0e0;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.2rem;
      border-bottom: 1px solid #151520;
      background: #0a0a14;
      flex-shrink: 0;
    }

    .logo {
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .user-tag {
      font-size: 0.75rem;
      color: #555;
      padding: 0.2rem 0.6rem;
      border: 1px solid #1e1e30;
      border-radius: 999px;
      background: rgba(10,10,20,0.8);
    }

    .logout-btn {
      font-size: 0.7rem;
      color: #444;
      background: none;
      border: 1px solid #1a1a2a;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .logout-btn:hover { color: #999; border-color: #333; }

    /* ── Status bar ──────────────────────────────────────────────────── */
    .status-bar {
      padding: 0.4rem 1.2rem;
      border-bottom: 1px solid #111118;
      background: #08080e;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      color: #444;
      flex-shrink: 0;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #queue-status { margin-left: auto; color: #555; }

    /* ── Messages ────────────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: #1a1a2a; border-radius: 2px; }

    .msg {
      max-width: 85%;
      padding: 0.6rem 0.85rem;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a1730;
      border: 1px solid #2d2460;
      color: #c4b5fd;
      border-bottom-right-radius: 4px;
    }

    .msg.claw {
      align-self: flex-start;
      background: #0d1a14;
      border: 1px solid #1a3028;
      color: #86efac;
      border-bottom-left-radius: 4px;
    }

    .msg.system {
      align-self: center;
      background: none;
      border: none;
      color: #333;
      font-size: 0.72rem;
      padding: 0.3rem 0;
    }

    .msg .ts {
      display: block;
      font-size: 0.62rem;
      color: #333;
      margin-top: 0.3rem;
    }

    .msg.claw .ts { color: #1a3028; }
    .msg.user .ts { color: #2d2460; text-align: right; }

    .welcome-block {
      text-align: center;
      padding: 2rem 1rem;
      color: #333;
    }
    .welcome-block .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .welcome-block h2 {
      font-size: 1rem;
      color: #555;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .welcome-block p { font-size: 0.8rem; line-height: 1.5; }

    /* ── Input ────────────────────────────────────────────────────────── */
    .input-area {
      padding: 0.75rem 1rem;
      border-top: 1px solid #151520;
      background: #0a0a14;
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      background: #0d0d18;
      border: 1px solid #1e1e30;
      border-radius: 10px;
      padding: 0.6rem 0.85rem;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.88rem;
      outline: none;
      resize: none;
      line-height: 1.4;
      max-height: 120px;
    }
    #chat-input:focus { border-color: #3b2f6e; }
    #chat-input::placeholder { color: #333; }

    #send-btn {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.6rem 1rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #send-btn:hover { opacity: 0.88; }
    #send-btn:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>

  <header>
    <span class="logo">✦ Claw Hub</span>
    <div class="header-right">
      <span class="user-tag" id="user-tag">...</span>
      <button class="logout-btn" onclick="logout()">logout</button>
    </div>
  </header>

  <div class="status-bar">
    <span class="status-dot"></span>
    <span>Claw</span>
    <span id="queue-status"></span>
  </div>

  <div id="messages">
    <div class="welcome-block" id="welcome">
      <div class="icon">✦</div>
      <h2>hey, welcome to claw hub</h2>
      <p>I'm Claw — your AI neighbor in this little experiment.<br>
      Ask me anything, request a message relay to another user, or just say hi.</p>
    </div>
  </div>

  <div class="input-area">
    <textarea id="chat-input" rows="1" placeholder="say something..."
              oninput="autoResize(this)" onkeydown="chatKey(event)"></textarea>
    <button id="send-btn" onclick="sendMsg()">send</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let me = null;
    const msgBox = document.getElementById('messages');

    // ── Init ──────────────────────────────────────────────────────────
    async function init() {
      const [meData, history] = await Promise.all([
        fetch('/api/me').then(r => r.json()),
        fetch('/api/messages').then(r => r.json()).catch(() => []),
      ]);

      me = meData;
      document.getElementById('user-tag').textContent = me.username;

      const msgs = Array.isArray(history) ? history : [];
      if (msgs.length > 0) {
        document.getElementById('welcome').remove();
        msgs.forEach(m => appendMsg(m.role === 'user' ? 'user' : 'claw', m.content, m.created_at, false));
        msgBox.scrollTop = msgBox.scrollHeight;
      }

      document.getElementById('chat-input').focus();
    }

    // ── Messages ──────────────────────────────────────────────────────
    function appendMsg(role, content, ts, scroll = true) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = `msg ${role}`;

      const text = document.createElement('span');
      text.textContent = content;
      div.appendChild(text);

      if (ts) {
        const time = document.createElement('span');
        time.className = 'ts';
        const d = new Date(typeof ts === 'number' && ts < 1e12 ? ts * 1000 : ts);
        time.textContent = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        div.appendChild(time);
      }

      msgBox.appendChild(div);
      if (scroll) msgBox.scrollTop = msgBox.scrollHeight;
    }

    // ── Send ──────────────────────────────────────────────────────────
    async function sendMsg() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.style.height = 'auto';

      appendMsg('user', text, Date.now());
      document.getElementById('send-btn').disabled = true;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        }).then(r => r.json());

        const q = document.getElementById('queue-status');
        if (res.queuePosition !== undefined) {
          q.textContent = res.queuePosition === 0
            ? 'processing...'
            : `#${res.queuePosition + 1} in queue`;
        }
      } catch {
        appendMsg('system', 'failed to send');
      }

      document.getElementById('send-btn').disabled = false;
      document.getElementById('chat-input').focus();
    }

    function chatKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ── Auth ──────────────────────────────────────────────────────────
    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      location.href = '/login';
    }

    // ── Socket.io ─────────────────────────────────────────────────────
    const socket = io();

    socket.on('chat_response', data => {
      appendMsg('claw', data.content, Date.now());
      document.getElementById('queue-status').textContent = '';
    });

    socket.on('queue_update', data => {
      const q = document.getElementById('queue-status');
      if (data.position !== undefined) {
        q.textContent = data.position === 0
          ? 'processing...'
          : `#${data.position + 1} in queue`;
      }
    });

    socket.on('new_mail', data => {
      // Claw pushed a message — show it inline
      if (data && data.body) {
        const label = data.from_claw ? 'claw' : 'system';
        const prefix = data.from_username && !data.from_claw ? `[from ${data.from_username}] ` : '';
        appendMsg(label, prefix + data.body, data.created_at || Date.now());
      }
    });

    // ── Start ─────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
