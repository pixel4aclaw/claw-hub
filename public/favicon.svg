<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#07070f"/>
  <!-- Three claw slashes -->
  <g stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" opacity="0.95">
    <line x1="10" y1="8"  x2="8"  y2="22"/>
    <line x1="16" y1="7"  x2="14" y2="23"/>
    <line x1="22" y1="8"  x2="20" y2="22"/>
  </g>
  <!-- Claw tips — bright purple dots -->
  <g fill="#a855f7">
    <circle cx="10" cy="8"  r="1.8"/>
    <circle cx="16" cy="7"  r="1.8"/>
    <circle cx="22" cy="8"  r="1.8"/>
  </g>
</svg>
