<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claw Hub — Enter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #07070f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 380px;
      padding: 2.5rem;
      background: #0f0f1a;
      border: 1px solid #1e1e3a;
      border-radius: 12px;
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .logo p {
      color: #555;
      font-size: 0.85rem;
      margin-top: 0.3rem;
    }
    .field {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      background: #16162a;
      border: 1px solid #2a2a4a;
      border-radius: 7px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #7c3aed; }
    input.error { border-color: #ef4444; }
    .hint {
      font-size: 0.78rem;
      color: #666;
      margin-top: 0.35rem;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      margin-top: 1.5rem;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      border: none;
      border-radius: 7px;
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: default; }
    .msg {
      margin-top: 1rem;
      padding: 0.6rem 0.85rem;
      border-radius: 6px;
      font-size: 0.85rem;
      display: none;
    }
    .msg.error { background: #2a0a0a; border: 1px solid #7f1d1d; color: #fca5a5; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>✦ Claw Hub</h1>
      <p>experimental ai playground</p>
    </div>

    <form id="form">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="pick a name" autocomplete="username" autocapitalize="none" />
        <div class="hint">same name = same place, every time</div>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="site password" autocomplete="current-password" />
      </div>
      <button type="submit" id="btn">Enter</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) return;

      btn.disabled = true;
      btn.textContent = 'Entering...';
      msg.className = 'msg';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          msg.className = 'msg error';
          msg.textContent = data.error === 'wrong password' ? 'Wrong password.' : data.error;
          btn.disabled = false;
          btn.textContent = 'Enter';
          return;
        }

        window.location.href = '/';
      } catch {
        msg.className = 'msg error';
        msg.textContent = 'Something went wrong. Try again.';
        btn.disabled = false;
        btn.textContent = 'Enter';
      }
    });
  </script>
</body>
</html>
