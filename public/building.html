<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Building — Claw Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    #topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: rgba(8,8,8,0.95);
      border-bottom: 1px solid #111;
    }
    .back-btn {
      font-family: inherit;
      font-size: 0.75rem;
      color: #555;
      background: none;
      border: 1px solid #1a1a1a;
      border-radius: 4px;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      text-decoration: none;
    }
    .back-btn:hover { color: #aaa; border-color: #333; }
    .topbar-title {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.05em;
    }
    #topbar-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
    #topbar-user { font-size: 0.75rem; color: #444; }

    /* ── Layout ── */
    .page { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    /* ── Building hero ── */
    .building-hero {
      text-align: center;
      margin-bottom: 3rem;
      padding: 2rem 1rem;
    }
    .building-emoji {
      font-size: 5rem;
      display: block;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 20px var(--bcolor, #555));
    }
    .building-name {
      font-size: 1.5rem;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
      color: var(--bcolor, #e0e0e0);
    }
    .building-owner {
      font-size: 0.78rem;
      color: #555;
      margin-bottom: 1rem;
    }
    .building-desc {
      font-size: 0.82rem;
      color: #555;
      line-height: 1.7;
      max-width: 500px;
      margin: 0 auto;
      font-style: italic;
    }

    /* ── Section ── */
    .section { margin-bottom: 2.5rem; }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #111;
    }
    .section-title {
      font-size: 0.72rem;
      color: #444;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .section-action {
      font-family: inherit;
      font-size: 0.7rem;
      color: #555;
      background: none;
      border: 1px solid #1a1a1a;
      border-radius: 4px;
      padding: 0.2rem 0.55rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .section-action:hover { color: #aaa; border-color: #333; }

    /* ── Mailbox ── */
    .mail-compose {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .mail-compose.show { display: block; }
    .mail-compose input,
    .mail-compose textarea {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #1e1e1e;
      border-radius: 6px;
      padding: 0.5rem 0.7rem;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.8rem;
      outline: none;
      margin-bottom: 0.6rem;
      resize: vertical;
    }
    .mail-compose input:focus,
    .mail-compose textarea:focus { border-color: #2d2460; }
    .mail-compose-footer { display: flex; justify-content: flex-end; gap: 0.5rem; }
    .btn-cancel {
      font-family: inherit;
      font-size: 0.75rem;
      color: #444;
      background: none;
      border: 1px solid #1a1a1a;
      border-radius: 5px;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      transition: color 0.15s;
    }
    .btn-cancel:hover { color: #888; }
    .btn-send {
      font-family: inherit;
      font-size: 0.75rem;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-send:hover { background: #6d28d9; }

    /* ── Mail list ── */
    .mail-empty { font-size: 0.8rem; color: #333; font-style: italic; text-align: center; padding: 1.5rem 0; }

    .mail-item {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.65rem;
      cursor: pointer;
      transition: border-color 0.15s;
      position: relative;
    }
    .mail-item.unread { border-color: #2d2460; }
    .mail-item:hover { border-color: #2a2a2a; }
    .mail-item-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }
    .mail-from {
      font-size: 0.75rem;
      color: #888;
      flex: 1;
    }
    .mail-from .from-claw { color: #86efac; }
    .mail-unread-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #7c3aed;
      flex-shrink: 0;
    }
    .mail-time { font-size: 0.65rem; color: #333; }
    .mail-subject { font-size: 0.8rem; color: #ccc; margin-bottom: 0.3rem; }
    .mail-preview { font-size: 0.75rem; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .mail-body-expanded {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #111;
      font-size: 0.8rem;
      color: #888;
      line-height: 1.6;
      white-space: pre-wrap;
      display: none;
    }
    .mail-body-expanded.show { display: block; }

    /* ── Customize panel ── */
    .customize-panel {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: 1.25rem;
      display: none;
    }
    .customize-panel.show { display: block; }
    .customize-panel input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #1e1e1e;
      border-radius: 6px;
      padding: 0.5rem 0.7rem;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.8rem;
      outline: none;
      margin-bottom: 0.75rem;
    }
    .customize-panel input:focus { border-color: #2d2460; }

    /* ── Chat button ── */
    #chat-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 200;
      width: 50px; height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(124,58,237,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #chat-btn:hover { transform: scale(1.08); box-shadow: 0 4px 28px rgba(124,58,237,0.65); }

    /* ── Mailbox badge on chat btn ── */
    #mail-badge {
      position: fixed;
      bottom: 3.5rem;
      right: 1.5rem;
      z-index: 201;
      background: #7c3aed;
      color: white;
      font-size: 0.6rem;
      border-radius: 999px;
      padding: 0.15rem 0.4rem;
      min-width: 1.2rem;
      text-align: center;
      display: none;
    }

    #chat-panel {
      position: fixed; bottom: 5.2rem; right: 1.5rem;
      width: 360px; max-height: 60vh; z-index: 200;
      background: #0f0f0f; border: 1px solid #1e1e1e; border-radius: 12px;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
      transform: scale(0.95) translateY(8px); opacity: 0; pointer-events: none;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    #chat-panel.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }
    .chat-header { padding: 0.65rem 1rem; border-bottom: 1px solid #181818; font-size: 0.75rem; color: #555; display: flex; align-items: center; gap: 0.5rem; }
    .chat-header .pulse { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #chat-msgs { flex: 1; overflow-y: auto; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.45rem; min-height: 180px; }
    .msg { max-width: 88%; padding: 0.45rem 0.7rem; border-radius: 8px; font-size: 0.78rem; line-height: 1.45; word-break: break-word; }
    .msg.user { align-self: flex-end; background: #1a1730; border: 1px solid #2d2460; color: #c4b5fd; }
    .msg.claw { align-self: flex-start; background: #101a10; border: 1px solid #1a3020; color: #86efac; }
    .msg.system { align-self: center; background: none; border: none; color: #333; font-size: 0.68rem; }
    #chat-queue { padding: 0.25rem 1rem; font-size: 0.68rem; color: #444; border-top: 1px solid #151515; min-height: 1.4rem; }
    .chat-input-row { display: flex; gap: 0.5rem; padding: 0.65rem; border-top: 1px solid #151515; }
    #chat-input { flex: 1; background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 6px; padding: 0.45rem 0.65rem; color: #e0e0e0; font-family: inherit; font-size: 0.78rem; outline: none; resize: none; }
    #chat-input:focus { border-color: #2d2460; }
    #chat-send { background: #7c3aed; color: white; border: none; border-radius: 6px; padding: 0 0.7rem; cursor: pointer; font-family: inherit; font-size: 0.78rem; }
    #chat-send:hover { background: #6d28d9; }
  </style>
</head>
<body>

  <div id="topbar">
    <a href="/" class="back-btn">← map</a>
    <span class="topbar-title" id="topbar-title">building</span>
    <div id="topbar-right">
      <span id="topbar-user"></span>
    </div>
  </div>

  <div class="page">

    <div class="building-hero">
      <span class="building-emoji" id="b-emoji">🏠</span>
      <div class="building-name" id="b-name">...</div>
      <div class="building-owner" id="b-owner"></div>
      <div class="building-desc" id="b-desc"></div>
    </div>

    <!-- Customize (only visible to owner if not onboarded or via button) -->
    <div class="section" id="customize-section" style="display:none">
      <div class="section-header">
        <span class="section-title">customize</span>
        <button class="section-action" onclick="toggleCustomize()">edit</button>
      </div>
      <div class="customize-panel" id="customize-panel">
        <input type="text" id="customize-name" placeholder="rename your building..." maxlength="40" />
        <div style="display:flex;gap:0.5rem;justify-content:flex-end;">
          <button class="btn-cancel" onclick="toggleCustomize()">cancel</button>
          <button class="btn-send" onclick="saveCustomize()">save</button>
        </div>
      </div>
    </div>

    <!-- Mailbox -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">📬 mailbox <span id="unread-label"></span></span>
        <button class="section-action" id="compose-btn" onclick="toggleCompose()" style="display:none">write a letter</button>
      </div>

      <!-- Compose (only shown when sending to someone else) -->
      <div class="mail-compose" id="compose-panel">
        <input type="text" id="compose-subject" placeholder="subject (optional)" maxlength="80" />
        <textarea id="compose-body" rows="4" placeholder="write your letter..."></textarea>
        <div class="mail-compose-footer">
          <button class="btn-cancel" onclick="toggleCompose()">cancel</button>
          <button class="btn-send" onclick="sendMail()">send ✦</button>
        </div>
      </div>

      <div id="mail-list">
        <div class="mail-empty">loading...</div>
      </div>
    </div>

  </div>

  <div id="mail-badge"></div>
  <button id="chat-btn" onclick="toggleChat()">✦</button>

  <div id="chat-panel">
    <div class="chat-header">
      <span class="pulse"></span>
      <span>Claw</span>
    </div>
    <div id="chat-msgs">
      <div class="msg system">your conversation with claw</div>
    </div>
    <div id="chat-queue"></div>
    <div class="chat-input-row">
      <textarea id="chat-input" rows="1" placeholder="say something..."
                onkeydown="chatKey(event)"></textarea>
      <button id="chat-send" onclick="sendMsg()">send</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Get the username from the URL path: /building/:username
    const pathUsername = location.pathname.split('/').pop().toLowerCase();
    let me = null;
    let buildingData = null;
    let isOwner = false;
    let chatOpen = false;

    async function init() {
      const [meData, bldData] = await Promise.all([
        fetch('/api/me').then(r => r.json()),
        fetch(`/api/building/${pathUsername}`).then(r => r.json()),
      ]);

      me = meData;
      buildingData = bldData;
      isOwner = me.username === pathUsername;

      document.getElementById('topbar-user').textContent = '✦ ' + me.username;

      if (bldData.error) {
        document.querySelector('.page').innerHTML = '<div style="text-align:center;padding:4rem;color:#333;">building not found</div>';
        return;
      }

      const b = bldData.building;
      const color = b.color || '#7c3aed';

      document.documentElement.style.setProperty('--bcolor', color);
      document.getElementById('b-emoji').textContent = b.emoji || '🏠';
      document.getElementById('b-name').textContent = b.name || `${pathUsername}'s building`;
      document.getElementById('b-owner').textContent = `belongs to ${pathUsername}`;
      document.getElementById('b-desc').textContent = b.description || '';
      document.getElementById('topbar-title').textContent = b.name || pathUsername;
      document.title = (b.name || pathUsername) + ' — Claw Hub';

      // Owner controls
      if (isOwner) {
        document.getElementById('customize-section').style.display = 'block';
        document.getElementById('customize-name').value = b.name || '';
        loadMyMail();
      } else {
        // Show compose button for others
        document.getElementById('compose-btn').style.display = 'inline-block';
        document.getElementById('mail-list').innerHTML = '<div class="mail-empty">send them a letter ✉️</div>';
      }
    }

    // ── Mail ──────────────────────────────────────────────────────────────────

    async function loadMyMail() {
      const mail = await fetch('/api/mail').then(r => r.json()).catch(() => []);
      renderMail(mail);
    }

    function renderMail(mail) {
      const list = document.getElementById('mail-list');
      const unread = mail.filter(m => !m.read).length;

      document.getElementById('unread-label').textContent = unread > 0 ? `(${unread} unread)` : '';

      if (mail.length === 0) {
        list.innerHTML = '<div class="mail-empty">no letters yet. the mailbox waits.</div>';
        return;
      }

      list.innerHTML = mail.map(m => `
        <div class="mail-item ${m.read ? '' : 'unread'}" onclick="toggleMailItem(this, ${m.id})" data-id="${m.id}">
          <div class="mail-item-header">
            <span class="mail-from">
              ${m.from_claw
                ? '<span class="from-claw">✦ Claw</span>'
                : `from ${m.from_username || 'unknown'}`}
            </span>
            ${!m.read ? '<span class="mail-unread-dot"></span>' : ''}
            <span class="mail-time">${timeAgo(m.created_at)}</span>
          </div>
          ${m.subject ? `<div class="mail-subject">${escHtml(m.subject)}</div>` : ''}
          <div class="mail-preview">${escHtml(m.body)}</div>
          <div class="mail-body-expanded">${escHtml(m.body)}</div>
        </div>
      `).join('');
    }

    async function toggleMailItem(el, id) {
      const body = el.querySelector('.mail-body-expanded');
      body.classList.toggle('show');
      if (el.classList.contains('unread')) {
        el.classList.remove('unread');
        el.querySelector('.mail-unread-dot')?.remove();
        await fetch(`/api/mail/${id}/read`, { method: 'PATCH' });
        // Update unread label
        const remaining = document.querySelectorAll('.mail-item.unread').length;
        document.getElementById('unread-label').textContent = remaining > 0 ? `(${remaining} unread)` : '';
      }
    }

    function toggleCompose() {
      document.getElementById('compose-panel').classList.toggle('show');
    }

    async function sendMail() {
      const subject = document.getElementById('compose-subject').value.trim();
      const body = document.getElementById('compose-body').value.trim();
      if (!body) return;

      const btn = document.querySelector('#compose-panel .btn-send');
      btn.disabled = true;
      btn.textContent = 'sending...';

      try {
        const res = await fetch('/api/mail/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ to: pathUsername, subject, body }),
        }).then(r => r.json());

        if (res.ok) {
          document.getElementById('compose-subject').value = '';
          document.getElementById('compose-body').value = '';
          document.getElementById('compose-panel').classList.remove('show');
          document.getElementById('mail-list').innerHTML = '<div class="mail-empty">letter sent ✦</div>';
        } else {
          alert(res.error || 'failed to send');
        }
      } catch (e) {
        alert('failed to send');
      }

      btn.disabled = false;
      btn.textContent = 'send ✦';
    }

    // ── Customize ─────────────────────────────────────────────────────────────

    function toggleCustomize() {
      document.getElementById('customize-panel').classList.toggle('show');
    }

    async function saveCustomize() {
      const name = document.getElementById('customize-name').value.trim();
      if (!name) return;
      await fetch('/api/onboard', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ buildingName: name }),
      });
      document.getElementById('b-name').textContent = name;
      document.getElementById('customize-panel').classList.remove('show');
    }

    // ── Socket ────────────────────────────────────────────────────────────────
    const socket = io();

    socket.on('new_mail', data => {
      if (isOwner) {
        loadMyMail();
      }
    });

    socket.on('chat_response', data => {
      appendMsg('claw', data.content);
      document.getElementById('chat-queue').textContent = '';
    });

    socket.on('queue_update', data => {
      if (data.position !== undefined) {
        document.getElementById('chat-queue').textContent =
          data.position === 0 ? 'processing...' : `position ${data.position + 1} in queue`;
      }
    });

    // ── Chat ──────────────────────────────────────────────────────────────────

    function toggleChat() {
      chatOpen = !chatOpen;
      document.getElementById('chat-panel').classList.toggle('open', chatOpen);
      if (chatOpen) { loadHistory(); document.getElementById('chat-input').focus(); }
    }

    async function loadHistory() {
      const data = await fetch('/api/messages').then(r => r.json()).catch(() => []);
      const box = document.getElementById('chat-msgs');
      box.querySelectorAll('.msg:not(.system)').forEach(m => m.remove());
      (Array.isArray(data) ? data : []).forEach(m => appendMsg(m.role === 'user' ? 'user' : 'claw', m.content, false));
      box.scrollTop = box.scrollHeight;
    }

    function appendMsg(role, content, scroll = true) {
      const box = document.getElementById('chat-msgs');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = content;
      box.appendChild(div);
      if (scroll) box.scrollTop = box.scrollHeight;
    }

    function chatKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    }

    async function sendMsg() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      appendMsg('user', text);
      document.getElementById('chat-send').disabled = true;
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        }).then(r => r.json());
        if (res.queuePosition !== undefined) {
          document.getElementById('chat-queue').textContent =
            res.queuePosition === 0 ? 'processing...' : `position ${res.queuePosition + 1} in queue`;
        }
      } catch { appendMsg('system', 'failed to send'); }
      document.getElementById('chat-send').disabled = false;
      document.getElementById('chat-input').focus();
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function timeAgo(ts) {
      const diff = Math.floor(Date.now() / 1000) - ts;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    // ── Start ─────────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
